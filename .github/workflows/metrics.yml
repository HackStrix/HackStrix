name: Generate GitHub Metrics
on:
  # Run automatically every 24 hours
  schedule: [{cron: "0 0 * * *"}]
  # Allow manual trigger for testing
  workflow_dispatch:
  # Run on every push to the master/main branch
  push: {branches: ["master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Core config
          user: HackStrix
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Toronto
          
          # Styling
          config_display: large
          output_action: commit
          committer_branch: master
          committer_message: "chore: update github metrics"
          
          # Add the specific plugins you care about (e.g., languages)
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: bytes-size, percentage
